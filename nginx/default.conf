# Reverse proxy: a single front door for the app.
#
#   http://localhost:8088/          -> frontend (Vite dev server, :5173)
#   http://localhost:8088/api/...   -> API (FastAPI/uvicorn, :8000)
#
# Serving the SPA and the API from one origin means the browser makes
# same-origin requests (no CORS, no Vite dev proxy needed) — closer to how a
# real deployment behaves.

# Map the Upgrade header so WebSocket connections (Vite HMR, and any future
# realtime endpoint) are proxied correctly. Declared in the http context.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Allow reasonably large request bodies (future uploads); tune per need.
    client_max_body_size 10m;

    # --- API -> FastAPI backend -------------------------------------------
    # No trailing slash on proxy_pass, so the full "/api/..." path is passed
    # through unchanged (the backend mounts every route under /api).
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Everything else -> Vite dev server (with HMR websocket) ----------
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
