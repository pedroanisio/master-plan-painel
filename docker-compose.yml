services:
  api:
    build:
      context: .
      target: api
    # Editable install (see Dockerfile) + the ./src mount below means live code
    # edits are picked up; --reload restarts uvicorn on change during dev.
    command: >-
      uvicorn master_plan.api.main:app
      --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    # Keep all three stores in the /data volume so projects, work entries, and
    # users persist together (the last two otherwise fall back to an ephemeral
    # in-container path). scripts/ is mounted so the seed can target the volume.
    environment:
      MASTER_PLAN_DB: /data/projects.json
      MASTER_PLAN_WORKLOG_DB: /data/work_entries.json
      MASTER_PLAN_USERS_DB: /data/users.json
      MASTER_PLAN_APIKEYS_DB: /data/api_keys.json
      # Bearer-token signing key. Without a stable value the app falls back to a
      # per-process random secret, so every uvicorn --reload restart silently
      # invalidates all sessions. Override per environment (host env or .env);
      # the default keeps sessions stable across restarts in UAT.
      MASTER_PLAN_SECRET: ${MASTER_PLAN_SECRET:-uat-change-me-please}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - api_data:/data

  frontend:
    build:
      context: .
      target: frontend
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    depends_on:
      - api
    # Still published directly so Vite's HMR websocket (which the browser opens
    # to :5173) works when the app is viewed through the proxy on :8080.
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules

  # Single front door: serves the SPA and proxies /api to the backend, so the
  # whole app runs on one origin (http://localhost:8088). Override the host port
  # with PROXY_PORT if 8088 is taken. See nginx/default.conf.
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - frontend
    ports:
      - "${PROXY_PORT:-8088}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  api_data:
  frontend_node_modules:
